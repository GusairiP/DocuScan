name: Android Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug Repository Structure
        run: |
          pwd
          echo "==== ROOT ===="
          ls -la
          echo "==== ALL FILES ===="
          find . -maxdepth 4 -type f | sort
